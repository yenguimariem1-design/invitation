<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>

    <!-- Fond gris Teams -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#ebebeb"/>
    </linearGradient>

    <!-- Corps enveloppe -->
    <linearGradient id="env-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8A9E52"/>
      <stop offset="40%"  stop-color="#6B7C3E"/>
      <stop offset="100%" stop-color="#4A5728"/>
    </linearGradient>

    <!-- Rabat enveloppe -->
    <linearGradient id="env-flap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#9AAF5A"/>
      <stop offset="50%"  stop-color="#7A9045"/>
      <stop offset="100%" stop-color="#6B7C3E"/>
    </linearGradient>

    <!-- Reflet doré sur rabat -->
    <linearGradient id="flap-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#C9A84C" stop-opacity="0.35"/>
      <stop offset="40%"  stop-color="#C9A84C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>

    <!-- Triangle bas -->
    <linearGradient id="env-bottom" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#3A4820"/>
      <stop offset="100%" stop-color="#4A5728"/>
    </linearGradient>

    <!-- Sceau doré -->
    <radialGradient id="seal-grad" cx="32%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#E8D08A"/>
      <stop offset="55%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9A7830"/>
    </radialGradient>

    <!-- Ombre portée -->
    <filter id="drop-shadow" x="-16%" y="-12%" width="132%" height="145%">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#000000" flood-opacity="0.50"/>
    </filter>

  </defs>

  <!-- Fond gris très clair (style Teams) -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Enveloppe 600×420, centrée -->
  <g transform="translate(300, 105)" filter="url(#drop-shadow)">

    <!-- Corps principal -->
    <rect width="600" height="420" rx="5"
          fill="url(#env-body)"
          stroke="#C9A84C" stroke-width="1.5"/>

    <!-- Double bordure intérieure dorée -->
    <rect x="6"  y="6"  width="588" height="408" rx="3" fill="none"
          stroke="#C9A84C" stroke-opacity="0.55" stroke-width="1"/>
    <rect x="11" y="11" width="578" height="398" rx="2" fill="none"
          stroke="#C9A84C" stroke-opacity="0.10" stroke-width="4"/>

    <!-- Triangles bas gauche / droite (ombre olive foncé) -->
    <polygon points="0,420 0,210 300,420"   fill="#4A5728"/>
    <polygon points="600,210 600,420 300,420" fill="#4A5728"/>

    <!-- Triangle bas centre (dégradé plus sombre) -->
    <polygon points="0,420 300,210 600,420" fill="url(#env-bottom)"/>

    <!-- Ligne centrale dorée verticale (bas) -->
    <line x1="300" y1="210" x2="300" y2="418"
          stroke="#C9A84C" stroke-opacity="0.50" stroke-width="0.8"/>

    <!-- Rabat (triangle haut vers bas) -->
    <polygon points="0,0 600,0 300,230" fill="url(#env-flap)"/>

    <!-- Reflet doré sur rabat -->
    <polygon points="0,0 600,0 300,230" fill="url(#flap-highlight)"/>

    <!-- Sceau — cercle doré au centre (300, 210) -->
    <circle cx="300" cy="210" r="52"
            fill="url(#seal-grad)"
            stroke="#E8D08A" stroke-width="2.5"/>

    <!-- Anneau extérieur doré -->
    <circle cx="300" cy="210" r="52"
            fill="none"
            stroke="#C9A84C" stroke-opacity="0.70" stroke-width="5.5"/>

    <!-- Halo externe -->
    <circle cx="300" cy="210" r="59"
            fill="none"
            stroke="#C9A84C" stroke-opacity="0.28" stroke-width="3"/>

    <!-- Reflet interne nacré -->
    <circle cx="300" cy="210" r="49"
            fill="#ffffff" fill-opacity="0.12"/>

    <!-- Ombre interne du sceau -->
    <circle cx="298" cy="206" r="46"
            fill="none"
            stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>

    <!-- Texte MY -->
    <text x="300" y="210"
          text-anchor="middle" dominant-baseline="central"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="26" font-weight="700"
          fill="#2D371E" letter-spacing="2">MY</text>

    <!-- Ornements ✦ aux 4 points cardinaux du sceau -->
    <text x="300" y="163" text-anchor="middle" dominant-baseline="central"
          font-family="Georgia, serif" font-size="10"
          fill="#2D371E" opacity="0.85">✦</text>
    <text x="300" y="257" text-anchor="middle" dominant-baseline="central"
          font-family="Georgia, serif" font-size="10"
          fill="#2D371E" opacity="0.85">✦</text>
    <text x="253" y="210" text-anchor="middle" dominant-baseline="central"
          font-family="Georgia, serif" font-size="10"
          fill="#2D371E" opacity="0.85">✦</text>
    <text x="347" y="210" text-anchor="middle" dominant-baseline="central"
          font-family="Georgia, serif" font-size="10"
          fill="#2D371E" opacity="0.85">✦</text>

  </g>
</svg>
